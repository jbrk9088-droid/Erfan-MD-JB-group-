<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERFAN-MD | Mini BOT</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>

body{
font-family:Poppins,sans-serif;
background:#0a0a0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
width:420px;
background:#14141e;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.title{
font-size:26px;
font-weight:700;
margin-bottom:10px;
background:linear-gradient(90deg,#FFD700,#FFA500);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:13px;
opacity:.6;
margin-bottom:25px;
}

.input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #444;
background:#0f0f15;
color:white;
margin-bottom:15px;
}

.btn{
width:100%;
padding:14px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:600;
background:linear-gradient(135deg,#FFD700,#FF8C00);
}

.codebox{
margin-top:20px;
padding:15px;
border-radius:12px;
background:#000;
font-size:22px;
letter-spacing:3px;
}

.footer{
margin-top:30px;
font-size:12px;
opacity:.6;
}

.social{
margin-top:15px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.social a{
padding:10px 16px;
border-radius:10px;
color:white;
text-decoration:none;
font-size:13px;
}

.tg{background:#0088cc;}
.wa{background:#25D366;}

</style>
</head>

<body>

<div class="card">

<div class="title">ERFAN-MD</div>
<div class="subtitle">Pair Code Generator</div>

<form id="pairForm">

<input type="text" id="phoneNumber" class="input" placeholder="CountryCode + Number">

<button class="btn">Generate Pair Code</button>

</form>

<div class="codebox" id="codeBox">---</div>

<div class="footer">

© 2026 | Powered By DEVELOPER

<div class="social">

<a class="tg" href="https://t.me/jb_papa71" target="_blank">
<i class="fab fa-telegram"></i> Telegram
</a>

<a class="wa" href="https://whatsapp.com/channel/0029Vb69yTi5PO0rX16dFQ1L" target="_blank">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

</div>

</div>

</div>

<script>

const form=document.getElementById("pairForm")
const phone=document.getElementById("phoneNumber")
const codeBox=document.getElementById("codeBox")

let server="server1"

form.addEventListener("submit",async(e)=>{
e.preventDefault()

let number=phone.value.replace(/\D/g,'')

if(!number){
codeBox.innerText="Enter Number"
return
}

codeBox.innerText="Loading..."

try{

let res=await axios.get("/api/code",{
params:{server:server,number:number}
})

codeBox.innerText=res.data.code||"Error"

}catch(err){

codeBox.innerText="API Error"

}

})

</script>

</body>
</html>
